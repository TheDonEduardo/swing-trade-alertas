name: Scanner Multi-Estrategia

on:
  schedule:
    # 20:05 UTC -> 22:05 CEST (España Verano)
    - cron: '5 20 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance pandas requests

      - name: Ejecutar Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # Asegúrate de que el nombre del script coincida con cómo lo guardaste
        run: python rombo_masivo.py
